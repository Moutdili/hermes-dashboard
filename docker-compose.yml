services:
  backend:
    build: ./backend
    ports:
      - "8899:8899"
    env_file: ./backend/.env
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vv_admin
      POSTGRES_PASSWORD: vv_admin_secret
      POSTGRES_DB: ville_en_vogue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: