services:
  # ─── Backend FastAPI ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-dashboard-backend
    ports:
      - "8898:8899"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hermes-net

  # ─── Frontend Next.js ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermes-dashboard-frontend
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8899
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hermes-net

  # ─── PostgreSQL 16 ────────────────────────────────
  postgres:
    image: docker.io/postgres:16-alpine
    container_name: hermes-dashboard-postgres
    env_file:
      - ./backend/.env.docker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vv_admin} -d ${POSTGRES_DB:-ville_en_vogue}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge

volumes:
  pgdata:
