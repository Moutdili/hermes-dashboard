name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vv_admin
          POSTGRES_PASSWORD: vv_admin_secret
          POSTGRES_DB: ville_en_vogue
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          cd backend
          pip install -e ".[dev]"
      - name: Run tests
        env:
          DASH_PG_HOST: localhost
          DASH_PG_PORT: 5432
          DASH_PG_USER: vv_admin
          DASH_PG_PASSWORD: vv_admin_secret
          DASH_PG_DATABASE: ville_en_vogue
        run: |
          cd backend
          pytest -v --tb=short